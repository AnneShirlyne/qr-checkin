<!DOCTYPE html>
<html>
<head>
<title>Event Invitation</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0f0f0f;
  color:#d4af37;
  font-family:Arial;
  text-align:center;
  margin-top:80px;
  overflow:hidden;
}

/* Smaller Subtle Watermark */
body::before{
  content:"OFFICIAL ACCESS";
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%, -50%) rotate(-25deg);
  font-size:40px;
  color:rgba(212,175,55,0.04);
  pointer-events:none;
  white-space:nowrap;
}

/* White QR Container */
.qr-wrapper{
  position:relative;
  width:270px;
  height:270px;
  margin:30px auto;
  background:#ffffff;
  padding:10px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(212,175,55,0.3);
}

#qrcode{
  width:250px;
  height:250px;
  margin:auto;
}

/* Gold Logo Center */
.logo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:55px;
  height:55px;
  background:#d4af37;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:28px;
  color:#000;
  box-shadow:0 0 12px rgba(212,175,55,0.7);
}

h2{
  font-size:26px;
}

p{
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<h2 id="guestName">Loading Invitation...</h2>

<div class="qr-wrapper">
  <div id="qrcode"></div>
  <div class="logo">B</div>
</div>

<p>Please present this QR code to staff for entry.</p>

<script>

// 🔹 Replace with your real values
const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// Get code from URL
const params = new URLSearchParams(window.location.search);
const guestCode = params.get("code");

async function loadGuest(){

  if(!guestCode){
    document.getElementById("guestName").innerText="Invalid Invitation";
    return;
  }

  const { data, error } = await supabaseClient
    .from("guests")
    .select("*")
    .eq("code", guestCode)
    .single();

  if(error || !data){
    document.getElementById("guestName").innerText="Invitation Not Found";
    return;
  }

  document.getElementById("guestName").innerText =
    "Invitation for " + data.name;

  new QRCode(document.getElementById("qrcode"), {
    text: guestCode,
    width: 250,
    height: 250,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
}

loadGuest();

</script>

</body>
</html>
