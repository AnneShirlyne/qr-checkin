<!DOCTYPE html>
<html>
<head>
  <title>Staff Login</title>
</head>
<body style="background:black;color:white;text-align:center;margin-top:100px;font-family:Arial;">

<h1>Event Staff Access</h1>

<input type="password" id="password" placeholder="Enter Staff Password"
style="padding:10px;font-size:18px;border-radius:8px;border:none;">

<br><br>

<button onclick="login()" 
style="padding:10px 20px;font-size:18px;border-radius:8px;background:gold;border:none;">
Enter
</button>

<script>
function login(){
  const pass = document.getElementById("password").value;

  if(pass === "Elite2026"){   // 🔐 change this password
    sessionStorage.setItem("staffAuth", "true");
    window.location.href = "checkin.html";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
