<!DOCTYPE html>
<html>
<head>
<title>Staff Access</title>
<style>
body{
  background:#0f0f0f;
  color:#d4af37;
  font-family:Arial;
  text-align:center;
  margin-top:150px;
}
input{
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:5px;
}
button{
  padding:12px 25px;
  font-size:18px;
  background:#d4af37;
  border:none;
  margin-top:15px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>Staff Login</h2>
<input type="password" id="pass" placeholder="Enter Password">
<br>
<button onclick="login()">Enter</button>

<script>
function login(){
  if(document.getElementById("pass").value === "Event2026"){
    sessionStorage.setItem("staffAuth","true");
    window.location.href="checkin.html";
  } else {
    alert("Incorrect Password");
  }
}
</script>

</body>
</html>
