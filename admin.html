<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:gold; font-family:Arial; padding:30px;">

<h1>Event Dashboard</h1>

<div id="stats" style="margin-top:20px; font-size:20px;"></div>

<h2 style="margin-top:40px;">Manual Check-In</h2>
<input type="text" id="searchName" placeholder="Enter Guest Name"
  style="padding:10px; font-size:16px;">
<button onclick="searchGuest()" style="padding:10px; background:gold; border:none;">
  Search
</button>

<div id="searchResult" style="margin-top:20px;"></div>

<script>
  if (sessionStorage.getItem("adminAuth") !== "true") {
    window.location.href = "login.html";
  }

  const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
  const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function loadStats() {
    const { count: total } = await supabaseClient
      .from("guests")
      .select("*", { count: "exact", head: true });

    const { count: checkedIn } = await supabaseClient
      .from("guests")
      .select("*", { count: "exact", head: true })
      .eq("used", true);

    document.getElementById("stats").innerHTML =
      "Total Invited: " + total +
      "<br>Checked In: " + checkedIn +
      "<br>Remaining: " + (total - checkedIn);
  }

  async function searchGuest() {
    const name = document.getElementById("searchName").value;

    const { data } = await supabaseClient
      .from("guests")
      .select("*")
      .ilike("name", "%" + name + "%");

    if (!data || data.length === 0) {
      document.getElementById("searchResult").innerHTML = "No Guest Found";
      return;
    }

    const guest = data[0];

    document.getElementById("searchResult").innerHTML =
      "Name: " + guest.name +
      "<br>Plus One: " + (guest.plus_one ? "Yes" : "No") +
      "<br>Status: " + (guest.used ? "Already Checked In" :
      "<button onclick='manualCheckIn(\"" + guest.code + "\")' style='background:gold; border:none; padding:5px;'>Check In</button>");
  }

  async function manualCheckIn(code) {
    await supabaseClient
      .from("guests")
      .update({ used: true })
      .eq("code", code);

    loadStats();
    document.getElementById("searchResult").innerHTML = "Guest Checked In!";
  }

  loadStats();
</script>

</body>
</html>
supabase
  .channel('realtime guests')
  .on('postgres_changes', 
      { event: '*', schema: 'public', table: 'guests' }, 
      () => {
        loadStats();
      })
  .subscribe();
