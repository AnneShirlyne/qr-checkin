<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#111;color:white;font-family:Arial;padding:30px;">

<h1>Live Guest Dashboard</h1>

<h2 id="counter">Loading...</h2>

<button onclick="exportCSV()" 
style="padding:10px 20px;background:gold;border:none;border-radius:8px;">
Export CSV
</button>

<br><br>

<table border="1" cellpadding="10" id="guestTable"></table>

<script>
const supabaseUrl = ""https://iirtdewqfhxgoccaxkxm.supabase.co";
const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadGuests(){
  const { data } = await supabaseClient
    .from("guests")
    .select("*")
    .order("name");

  const checkedIn = data.filter(g => g.used).length;

  document.getElementById("counter").innerText =
    "Checked In: " + checkedIn + " / " + data.length;

  let tableHTML = "<tr><th>Name</th><th>Plus One</th><th>Status</th></tr>";

  data.forEach(g => {
    tableHTML += "<tr>" +
      "<td>" + g.name + "</td>" +
      "<td>" + (g.plus_one ? "Yes" : "No") + "</td>" +
      "<td>" + (g.used ? "✅" : "Pending") + "</td>" +
      "</tr>";
  });

  document.getElementById("guestTable").innerHTML = tableHTML;
}

function exportCSV(){
  supabaseClient.from("guests").select("*").then(({data})=>{
    let csv = "Name,Plus One,Checked In\n";
    data.forEach(g=>{
      csv += `${g.name},${g.plus_one},${g.used}\n`;
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "guest_list.csv";
    a.click();
  });
}

setInterval(loadGuests, 3000); // live refresh every 3 sec
loadGuests();
</script>

</body>
</html>
