<!DOCTYPE html>
<html>
<head>
  <title>Event Check-In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px; background:#111; color:white;">

<h2 id="status">Checking Guest...</h2>
<div id="result" style="font-size: 20px; margin-top: 20px;"></div>

<script>

  // 🔐 Staff protection
  if(sessionStorage.getItem("staffAuth") !== "true"){
    window.location.href = "login.html";
  }

  // 🔹 Supabase connection
  const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
  const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";

  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const params = new URLSearchParams(window.location.search);
  const guestCode = params.get("code");

  async function checkGuest() {

    if (!guestCode) {
      document.getElementById("status").innerText = "Invalid QR Code";
      return;
    }

    const { data, error } = await supabaseClient
      .from("guests")
      .select("*")
      .eq("code", guestCode)
      .single();

    if (error || !data) {
      document.getElementById("status").innerText = "Guest Not Found";
      return;
    }

    if (data.used === true) {
      document.getElementById("status").innerText = "❌ QR Code Already Used";
      return;
    }

    // Mark as used
    const { error: updateError } = await supabaseClient
      .from("guests")
      .update({ used: true })
      .eq("code", guestCode);

    if (updateError) {
      document.getElementById("status").innerText = "Error updating guest";
      return;
    }

    document.getElementById("status").innerText = "✅ Welcome!";
    document.getElementById("result").innerHTML =
      "<strong>Name:</strong> " + data.name + "<br>" +
      "<strong>Plus One:</strong> " + (data.plus_one ? "Yes" : "No");

    // Auto reset after 5 seconds
    setTimeout(() => {
      window.location.href = "checkin.html";
    }, 5000);

  }

  checkGuest();

</script>

</body>
</html>
