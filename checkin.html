<!DOCTYPE html>
<html>
<head>
<title>BOMEXA Check-In</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  background:#0f0f0f;
  color:#d4af37;
  font-family:Arial;
  text-align:center;
  margin-top:40px;
}
h2{font-size:28px;}

#reader{
  width:300px;
  margin:auto;
}

button{
  padding:10px 20px;
  margin:8px;
  border:none;
  background:#d4af37;
  cursor:pointer;
  font-weight:bold;
}

input{
  padding:10px;
  font-size:16px;
}

.success{
  font-size:40px;
  animation:pop .4s ease;
}

.error{
  font-size:26px;
  color:red;
}

.counterBox{
  position:absolute;
  top:20px;
  right:30px;
  text-align:right;
  font-size:16px;
}

@keyframes pop{
  0%{transform:scale(.6);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("staffAuth") !== "true"){
  window.location.href="login.html";
}
</script>

<div class="counterBox">
<div>Guests: <span id="guestCount">0</span></div>
<div>Plus-Ones: <span id="plusCount">0</span></div>
<div>Total Attending: <span id="totalCount">0</span></div>
</div>

<h2 id="status">Ready</h2>
<div id="result"></div>

<br>
<div id="reader"></div>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>
<button onclick="switchCamera()">Switch Camera</button>

<br><br>

<input type="text" id="manualInput" placeholder="Enter Name or Code">
<button onclick="manualCheck()">Check In</button>

<script>

// 🔹 YOUR SUPABASE
const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let html5QrCode;
let currentCamera = "environment";
let scannerRunning = false;

/* =============================
   COUNTER SYSTEM
============================= */

async function updateCounters(){

  const { data, error } = await supabaseClient
    .from("guests")
    .select("id, plus_one")
    .eq("used", true);

  if(error || !data){
    document.getElementById("guestCount").innerText = 0;
    document.getElementById("plusCount").innerText = 0;
    document.getElementById("totalCount").innerText = 0;
    return;
  }

  let guestCount = data.length;
  let plusCount = 0;

  data.forEach(g=>{
    if(g.plus_one && g.plus_one.trim() !== ""){
      plusCount++;
    }
  });

  document.getElementById("guestCount").innerText = guestCount;
  document.getElementById("plusCount").innerText = plusCount;
  document.getElementById("totalCount").innerText = guestCount + plusCount;
}

/* =============================
   RESET SCREEN
============================= */

function restart(){
  setTimeout(()=>{
    document.getElementById("status").innerText="Ready";
    document.getElementById("result").innerHTML="";
  },4000);
}

/* =============================
   PROCESS CHECK-IN
============================= */

async function processCode(inputValue){

  document.getElementById("status").innerText="Checking Guest...";

  let { data, error } = await supabaseClient
    .from("guests")
    .select("*")
    .or(`code.eq.${inputValue},name.ilike.%${inputValue}%`)
    .limit(1)
    .single();

  if(error || !data){
    document.getElementById("status").innerHTML=
      "<div class='error'>Guest Not Found</div>";
    restart();
    return;
  }

  if(data.used){
    document.getElementById("status").innerHTML=
      "<div class='error'>Already Checked In</div>";
    restart();
    return;
  }

  const { error: updateError } = await supabaseClient
    .from("guests")
    .update({ used:true })
    .eq("id", data.id);

  if(updateError){
    document.getElementById("status").innerHTML=
      "<div class='error'>Update Failed</div>";
    restart();
    return;
  }

  document.getElementById("status").innerHTML=
    "<div class='success'>🎉 Welcome "+data.name+"</div>";

  document.getElementById("result").innerHTML=
    "<strong>Plus One:</strong> "+
    (data.plus_one ? data.plus_one : "None");

  updateCounters();
  restart();
}

/* =============================
   MANUAL CHECK
============================= */

function manualCheck(){
  const value=document.getElementById("manualInput").value;
  if(value) processCode(value);
}

/* =============================
   QR SCANNER
============================= */

function onScanSuccess(decodedText){
  processCode(decodedText);
}

async function startScanner(){
  if(scannerRunning) return;

  html5QrCode=new Html5Qrcode("reader");

  await html5QrCode.start(
    { facingMode: currentCamera },
    { fps:10, qrbox:250 },
    onScanSuccess
  );

  scannerRunning=true;
}

async function stopScanner(){
  if(html5QrCode && scannerRunning){
    await html5QrCode.stop();
    scannerRunning=false;
  }
}

function switchCamera(){
  if(!scannerRunning) return;

  html5QrCode.stop().then(()=>{
    currentCamera = currentCamera === "environment" ? "user" : "environment";
    startScanner();
  });
}

/* =============================
   INITIAL LOAD
============================= */

updateCounters();

</script>

</body>
</html>
