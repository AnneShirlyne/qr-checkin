<!DOCTYPE html>
<html>
<head>
  <title>Event Check-In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Checking Guest...</h2>
<div id="result"></div>

<script>
  const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
  const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const params = new URLSearchParams(window.location.search);
  const guestCode = params.get("code");

  async function checkGuest() {
    if (!guestCode) {
      document.getElementById("result").innerText = "Invalid QR Code";
      return;
    }

    const { data, error } = await supabaseClient
      .from("guests")
      .select("*")
      .eq("code", guestCode)
      .single();

    if (error || !data) {
      document.getElementById("result").innerText = "Guest Not Found";
      return;
    }

    if (data.used) {
      document.getElementById("result").innerHTML =
        "❌ This QR code has already been used.";
      return;
    }

    // Mark as used
    await supabaseClient
      .from("guests")
      .update({ used: true })
      .eq("code", guestCode);

    document.getElementById("result").innerHTML =
      "✅ Welcome " + data.name + "<br>Plus One: " + (data.plus_one ? "Yes" : "No");
  }

  checkGuest();
</script>

</body>
</html>
