<!DOCTYPE html>
<html>
<head>
  <title>Event Check-In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:gold; font-family:Arial; text-align:center;">

<h1 style="margin-top:30px;">Event Check-In</h1>

<div id="reader" style="width:300px; margin:30px auto;"></div>

<h2 id="status">Ready to Scan</h2>
<div id="result" style="font-size:20px;"></div>
<div id="counter" style="margin-top:20px;"></div>

<audio id="successSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function updateCounter() {
  const { count } = await supabaseClient
    .from("guests")
    .select("*", { count: "exact", head: true })
    .eq("used", true);

  document.getElementById("counter").innerText =
    "Total Checked In: " + count;
}

async function processCode(code) {

  const { data, error } = await supabaseClient
    .from("guests")
    .select("*")
    .eq("code", code)
    .single();

  if (error || !data) {
    showError("Guest Not Found");
    return;
  }

  if (data.used) {
    showError("Already Checked In");
    return;
  }

  await supabaseClient
    .from("guests")
    .update({ used: true })
    .eq("code", code);

  showSuccess(data);
  updateCounter();
}

function showSuccess(data) {
  document.body.style.background = "#16a34a";
  document.getElementById("status").innerText = "ACCESS GRANTED";
  document.getElementById("result").innerHTML =
    "Welcome " + data.name +
    "<br>Plus One: " + (data.plus_one ? "Yes" : "No");
  document.getElementById("successSound").play();

  setTimeout(resetScreen, 4000);
}

function showError(msg) {
  document.body.style.background = "#dc2626";
  document.getElementById("status").innerText = msg;
  document.getElementById("result").innerHTML = "";
  setTimeout(resetScreen, 4000);
}

function resetScreen() {
  document.body.style.background = "black";
  document.getElementById("status").innerText = "Ready to Scan";
  document.getElementById("result").innerHTML = "";
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      qrCodeMessage => {
        html5QrCode.stop();
        processCode(qrCodeMessage.split("code=")[1]);
        setTimeout(() => html5QrCode.start(devices[0].id, { fps:10, qrbox:250 }, qrCodeMessage => {
          processCode(qrCodeMessage.split("code=")[1]);
        }), 5000);
      }
    );
  }
});

updateCounter();
</script>

</body>
</html>
