<!DOCTYPE html>
<html>
<head>
  <title>Event Check-In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:gold; font-family:Arial; text-align:center; margin:0; padding:20px;">

<h1>Event Check-In</h1>

<div id="reader" style="width:300px; margin:20px auto;"></div>

<button onclick="switchCamera()" 
  style="padding:8px 15px; background:gold; border:none; margin-bottom:15px;">
  Switch Camera
</button>

<h2 id="status">Ready to Scan</h2>
<div id="result" style="font-size:20px; margin-top:10px;"></div>
<div id="counter" style="margin-top:20px;"></div>

<audio id="successSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let html5QrCode = new Html5Qrcode("reader");
let currentCameraId = null;
let cameras = [];

async function updateCounter() {
  const { count } = await supabaseClient
    .from("guests")
    .select("*", { count: "exact", head: true })
    .eq("used", true);

  document.getElementById("counter").innerText =
    "Total Checked In: " + (count || 0);
}

async function processCode(code) {
  if (!code) return;

  const { data, error } = await supabaseClient
    .from("guests")
    .select("*")
    .eq("code", code)
    .single();

  if (error || !data) {
    showError("Guest Not Found");
    return;
  }

  if (data.used) {
    showError("Already Checked In");
    return;
  }

  await supabaseClient
    .from("guests")
    .update({ used: true })
    .eq("code", code);

  showSuccess(data);
  updateCounter();
}

function showSuccess(data) {
  document.body.style.background = "#16a34a";
  document.getElementById("status").innerText = "ACCESS GRANTED";
  document.getElementById("result").innerHTML =
    "Welcome " + data.name +
    "<br>Plus One: " + (data.plus_one ? "Yes" : "No");
  document.getElementById("successSound").play();

  setTimeout(resetScreen, 4000);
}

function showError(message) {
  document.body.style.background = "#dc2626";
  document.getElementById("status").innerText = message;
  document.getElementById("result").innerHTML = "";
  setTimeout(resetScreen, 4000);
}

function resetScreen() {
  document.body.style.background = "black";
  document.getElementById("status").innerText = "Ready to Scan";
  document.getElementById("result").innerHTML = "";
}

async function startScanner(cameraId) {
  await html5QrCode.start(
    cameraId,
    { fps: 10, qrbox: 250 },
    qrMessage => {
      html5QrCode.stop().then(() => {
        try {
          const url = new URL(qrMessage);
          const code = url.searchParams.get("code");
          processCode(code);
        } catch {
          processCode(qrMessage);
        }
        setTimeout(() => startScanner(currentCameraId), 5000);
      });
    },
    errorMessage => {}
  );
}

async function initScanner() {
  cameras = await Html5Qrcode.getCameras();

  if (!cameras || cameras.length === 0) {
    document.getElementById("status").innerText = "No Camera Found";
    return;
  }

  // Try to find back camera first
  const backCam = cameras.find(cam =>
    cam.label.toLowerCase().includes("back") ||
    cam.label.toLowerCase().includes("environment")
  );

  currentCameraId = backCam ? backCam.id : cameras[0].id;
  startScanner(currentCameraId);
}

async function switchCamera() {
  if (cameras.length < 2) return;

  await html5QrCode.stop();

  const currentIndex = cameras.findIndex(cam => cam.id === currentCameraId);
  const nextIndex = (currentIndex + 1) % cameras.length;
  currentCameraId = cameras[nextIndex].id;

  startScanner(currentCameraId);
}

updateCounter();
initScanner();
</script>

</body>
</html>
