<!DOCTYPE html>
<html>
<head>
<title>BOMEXA Check-In</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  background:#0f0f0f;
  color:#d4af37;
  font-family:Arial;
  text-align:center;
  margin-top:40px;
}
h2{font-size:28px;}
#reader{width:300px;margin:auto;}
button{
  padding:10px 20px;
  margin:8px;
  border:none;
  background:#d4af37;
  cursor:pointer;
}
input{
  padding:10px;
  font-size:16px;
}
.success{
  font-size:38px;
  animation:pop .4s ease;
}
.error{
  font-size:26px;
  color:red;
}
.counter{
  position:absolute;
  top:20px;
  right:30px;
  font-size:18px;
}
@keyframes pop{
  0%{transform:scale(.6);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("staffAuth") !== "true"){
  window.location.href="login.html";
}
</script>

<div class="counter">
Checked In: <span id="count">0</span>
</div>

<h2 id="status">Ready</h2>
<div id="result"></div>

<br>
<div id="reader"></div>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>
<button onclick="switchCamera()">Switch Camera</button>

<br><br>

<input type="text" id="manualInput" placeholder="Enter Name or Code">
<button onclick="manualCheck()">Check In</button>

<script>

// 🔹 REPLACE WITH YOUR SUPABASE VALUES
const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let html5QrCode;
let currentCamera = "environment";
let scannerRunning = false;

async function updateCounter(){
  const { count } = await supabaseClient
    .from("guests")
    .select("*", { count: "exact", head: true })
    .eq("used", true);
  document.getElementById("count").innerText = count;
}

function restart(){
  setTimeout(()=>{
    document.getElementById("status").innerText="Ready";
    document.getElementById("result").innerHTML="";
  },4000);
}

async function processCode(inputValue){

  document.getElementById("status").innerText="Checking Guest...";

  let { data, error } = await supabaseClient
    .from("guests")
    .select("*")
    .or(`code.eq.${inputValue},name.ilike.%${inputValue}%`)
    .limit(1)
    .single();

  if(error || !data){
    document.getElementById("status").innerHTML=
      "<div class='error'>Guest Not Found</div>";
    restart();
    return;
  }

  if(data.used){
    document.getElementById("status").innerHTML=
      "<div class='error'>Already Checked In</div>";
    restart();
    return;
  }

  await supabaseClient
    .from("guests")
    .update({ used:true })
    .eq("id", data.id);

  document.getElementById("status").innerHTML=
    "<div class='success'>🎉 Welcome "+data.name+"</div>";

  document.getElementById("result").innerHTML=
    "<strong>Plus One:</strong> "+
    (data.plus_one ? data.plus_one : "None");

  updateCounter();
  restart();
}

function manualCheck(){
  const value=document.getElementById("manualInput").value;
  if(value) processCode(value);
}

function onScanSuccess(decodedText){
  processCode(decodedText);
}

async function startScanner(){
  if(scannerRunning) return;

  html5QrCode=new Html5Qrcode("reader");

  await html5QrCode.start(
    { facingMode: currentCamera },
    { fps:10, qrbox:250 },
    onScanSuccess
  );

  scannerRunning=true;
}

async function stopScanner(){
  if(html5QrCode && scannerRunning){
    await html5QrCode.stop();
    scannerRunning=false;
  }
}

function switchCamera(){
  if(!scannerRunning) return;

  html5QrCode.stop().then(()=>{
    currentCamera = currentCamera === "environment" ? "user" : "environment";
    startScanner();
  });
}

updateCounter();

</script>

</body>
</html>
