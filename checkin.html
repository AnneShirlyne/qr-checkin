<!DOCTYPE html>
<html>
<head>
  <title>BOMEXA Check-In</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      text-align:center;
      margin-top:40px;
    }

    button {
      padding:10px 20px;
      margin:10px;
      border-radius:8px;
      border:none;
      cursor:pointer;
    }

    #reader {
      width:300px;
      margin:auto;
      margin-top:20px;
    }

    .success { color:lime; font-size:22px; }
    .error { color:red; font-size:22px; }
  </style>
</head>

<body>

<h2 id="status">Ready to Scan</h2>

<div id="reader"></div>

<div style="margin-top:20px;">
  <button onclick="switchCamera()">Switch Camera</button>
</div>

<div style="margin-top:30px;">
  <input type="text" id="manualCode" placeholder="Enter code manually">
  <button onclick="manualCheck()">Check In</button>
</div>

<script>

  // 🔐 Staff protection
  if(sessionStorage.getItem("staffAuth") !== "true"){
    window.location.href = "login.html";
  }

  const supabaseUrl = "https://iirtdewqfhxgoccaxkxm.supabase.co";
  const supabaseKey = "sb_publishable_6tLW_KWUnL38KI_uOVaGCQ_mkQELQjM";
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const html5QrCode = new Html5Qrcode("reader");

  let currentCamera = "environment";

  function startScanner() {
    html5QrCode.start(
      { facingMode: currentCamera },
      { fps: 10, qrbox: 250 },
      qrMessage => {
        html5QrCode.stop();
        const codeParam = new URL(qrMessage).searchParams.get("code");
        if (codeParam) processCode(codeParam);
        else processCode(qrMessage);
      }
    );
  }

  function switchCamera() {
    html5QrCode.stop().then(() => {
      currentCamera = currentCamera === "environment" ? "user" : "environment";
      startScanner();
    });
  }

  async function processCode(code) {

    document.getElementById("status").innerText = "Checking Guest...";

    const { data, error } = await supabaseClient
      .from("guests")
      .select("*")
      .eq("code", code)
      .single();

    if (error || !data) {
      document.getElementById("status").innerHTML =
        "<div class='error'>Guest Not Found</div>";
      restart();
      return;
    }

    if (data.used) {
      document.getElementById("status").innerHTML =
        "<div class='error'>QR Code Already Used</div>";
      restart();
      return;
    }

    await supabaseClient
      .from("guests")
      .update({ used: true })
      .eq("code", code);

    document.getElementById("status").innerHTML =
      "<div class='success'>Welcome " + data.name + "</div>";

    restart();
  }

  function manualCheck() {
    const code = document.getElementById("manualCode").value.trim();
    if (code) processCode(code);
  }

  function restart() {
    setTimeout(() => {
      document.getElementById("status").innerText = "Ready to Scan";
      document.getElementById("manualCode").value = "";
      startScanner();
    }, 4000);
  }

  // If QR link contains ?code= param
  const params = new URLSearchParams(window.location.search);
  const urlCode = params.get("code");

  if (urlCode) {
    processCode(urlCode);
  } else {
    startScanner();
  }

</script>

</body>
</html>
